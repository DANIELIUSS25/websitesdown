<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(165,180,252,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#060709"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.6" fill="rgba(255,255,255,0.025)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Logo icon -->
  <g transform="translate(540, 160)">
    <circle cx="60" cy="50" r="28" fill="none" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round"/>
    <line x1="80" y1="70" x2="95" y2="85" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round"/>
    <circle cx="60" cy="50" r="9" fill="#34d399"/>
  </g>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" fill="#eef0f4" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-2">
    WebsiteDown<tspan fill="#3d4758" font-weight="600">.com</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="375" text-anchor="middle" fill="#a5b4fc" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    Is that website actually down?
  </text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="#6e7a8e" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500">
    Real-time checks + AI web intelligence. Find out in seconds.
  </text>
  <!-- Bottom border accent -->
  <rect x="480" y="480" width="240" height="3" rx="1.5" fill="#a5b4fc" opacity="0.3"/>
</svg>

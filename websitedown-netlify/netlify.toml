[build]
  publish = "public"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Rewrite /service-down URLs to homepage (SPA-style)
[[redirects]]
  from = "/*-down"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*-status"
  to = "/index.html"
  status = 200

# Catch-all for any other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
